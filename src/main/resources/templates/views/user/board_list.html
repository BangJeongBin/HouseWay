<!DOCTYPE html>
<html lang="ko"
      xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org/)"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">

<th:block layout:fragment="content" class="service-details-page">
    <main id="content"
          th:with="pglink=${(#strings.isEmpty(param.findkey)) ? '/board/list?cpg=' : '/board/find?findtype=' + param.findtype + '&findkey=' + param.findkey + '&cpg='}">

        <!-- Page Title -->
        <div class="page-title light-background">
            <div class="container d-lg-flex justify-content-between align-items-center">
                <h1 class="mb-2 mb-lg-0">Blog</h1>
                <nav class="breadcrumbs">
                    <ol>
                        <li><a href="index.html">Home</a></li>
                        <li class="current">Blog</li>
                    </ol>
                </nav>
            </div>
        </div><!-- End Page Title -->

        <div class="container">
            <div class="row">

                <div class="">

                    <!-- Blog Posts Section -->
                    <section id="blog-posts" class="blog-posts section">

                        <div class="container">

                            <div class="row gy-4">
                                <div style="text-align: end"><button class="btn btn-outline-success">새글쓰기</button></div>

                                <div class="col-lg-12" th:if="${board}!=null">
                                    <article class="col-12" style="display: inline-flex; height: 150px;" th:each="bd : ${board}">

                                        <h2 class="title col-8">
                                            <a th:href="|/board/detail/${bd.board_num}|">[[${bd.board_title}]]</a>
                                        </h2>

                                        <div class="meta-top">
                                            <ul>
                                                <li style="margin: 15px;" class="d-flex align-items-center"><i class="bi bi-person"></i> <a
                                                        href="blog-details.html">John Doe</a></li>
                                                <li class="d-flex align-items-center"><i class="bi bi-clock"></i> <a
                                                        href="blog-details.html"><time datetime="2022-01-01">Jan 1, 2022</time></a></li>
                                                <li class="d-flex align-items-center"><i class="bi bi-chat-dots"></i> <a
                                                        href="blog-details.html">12 Comments</a></li>
                                            </ul>
                                        </div>

                                        <div class="content">
                                            <div class="read-more">
                                                <a href="blog-details.html">Read More</a>
                                            </div>
                                        </div>

                                    </article>
                                </div><!-- End post list item -->


                            </div><!-- End blog posts list -->

                        </div>

                    </section><!-- /Blog Posts Section -->

                    <!-- Blog Pagination Section -->
                    <section id="blog-pagination" class="blog-pagination section">

                        <div class="container">
                            <div class="d-flex justify-content-center">
                                <ul>
                                    <li><a href="#"><i class="bi bi-chevron-left"></i></a></li>
                                    <li><a href="#">1</a></li>
                                    <li><a href="#" class="active">2</a></li>
                                    <li><a href="#">3</a></li>
                                    <li><a href="#">4</a></li>
                                    <li>...</li>
                                    <li><a href="#">10</a></li>
                                    <li><a href="#"><i class="bi bi-chevron-right"></i></a></li>
                                </ul>
                            </div>
                        </div>

                    </section><!-- /Blog Pagination Section -->

                </div>

            </div>
        </div>

    </main>

</th:block>


<!-- Scroll Top -->
<a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i
        class="bi bi-arrow-up-short"></i></a>


</html>
