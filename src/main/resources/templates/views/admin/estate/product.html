<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{layouts/layout_admin}">

<th:block layout:fragment="content">

	<div class="app-wrapper"
		 th:with="pglink=${(#strings.isEmpty(param.findkey)) ?
                '/admin/product?cpg=' : '/admin/product_find?findtype=' + param.findtype + '&findkey=' + param.findkey + '&cpg='}">

		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">
				<div class="row g-3 mb-4 align-items-center justify-content-between">
					<div class="col-auto">
						<h1 class="app-page-title mb-0" >[[${estateDto.totalCount}]]개의 매물</h1>
					</div>
					<div class="col-auto">
						<div class="page-utilities">
							<div class="row g-2 justify-content-start justify-content-md-end align-items-center">
								<div class="col-auto">

									<!-- 상단 검색 form 영역 start -->
									<form class="docs-search-form row gx-1 align-items-center">
										<div class="col-auto">
											<input type="text" id="search-docs" name="searchdocs" class="form-control search-docs" placeholder="Search">
										</div>
										<div class="col-auto">
											<button type="submit" class="btn app-btn-secondary">Search</button>
										</div>
									</form>
									<!-- 상단 검색 form 영역 end -->

								</div>
								<div class="col-auto">

									<!-- 정렬 start -->
									<div class="dropdown">
										<button class="btn app-btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
											--- 정렬 ---
										</button>
										<ul class="dropdown-menu">
											<li><a class="dropdown-item" th:href="|/admin/product|">모든매물</a></li>
											<li><a class="dropdown-item" th:href="|/admin/product_sort?sno=1|">판매중</a></li>
											<li><a class="dropdown-item" th:href="|/admin/product_sort?sno=2|">판매완료</a></li>
										</ul>
									</div>
									<!-- 정렬 end -->

								</div>

								<div class="col-auto">
									<a class="btn app-btn-primary" href="#"><svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-upload me-2" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
										<path fill-rule="evenodd" d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
										<path fill-rule="evenodd" d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
									</svg>Upload File</a>
								</div>
							</div><!--//row-->
						</div><!--//table-utilities-->
					</div><!--//col-auto-->
				</div><!--//row-->

<!-- 매물 블럭 리스트 페이지 start -->
				<div class="row g-4">

					<!-- 매물 블럭 낱개 start -->
					<th:block th:each="lists : ${estateDto.estateList}">
						<div class="col-6 col-md-4 col-xl-3 col-xxl-2">
							<div class="app-card app-card-doc shadow-sm h-100">
								<div class="app-card-thumb-holder p-3">
									<th:block th:each="img : ${estateDto.estateImageList}">
										<th:block th:if="${img.estate_id eq lists.estate_id}">
											<img th:src="${img.img1}" class="card-img-top" alt="...">
										</th:block>
									</th:block>

									<!-- 매물 이미지 뱃지 -->
									<th:block th:if="${lists.estate_viewCount gt 10}">
										<span class="badge bg-danger">HIT</span>
									</th:block>

									<th:block th:if="${lists.estate_state eq 1}">
										<span class="badge bg-success">판매중</span>
									</th:block>

									<th:block th:if="${lists.estate_state eq 0}">
										<span class="badge bg-warning">판매완료</span>
									</th:block>

								</div>
								<div class="app-card-body p-3 has-card-actions">

									<h4 class="app-doc-title truncate mb-0" th:text="${lists.estate_title}"></h4>
									<div class="app-doc-meta">
										<ul class="list-unstyled mb-0">
											<li><span class="text-muted">id:</span> [[${lists.estate_id}]]</li>
											<li><span class="text-muted">주소:</span> [[${lists.estate_addr}]]</li>
											<li><span class="text-muted">보증금:</span> [[${lists.estate_deposit}]]</li>
											<li><span class="text-muted">월세:</span> [[${lists.estate_rent}]]</li>
										</ul>
									</div><!--//app-doc-meta-->

									<div class="app-card-actions">
										<div class="dropdown">
											<div class="dropdown-toggle no-toggle-arrow" data-bs-toggle="dropdown" aria-expanded="false">
												<svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-three-dots-vertical" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
													<path fill-rule="evenodd" d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
												</svg>
											</div>

											<!-- 드롭다운 메뉴 start -->
											<ul class="dropdown-menu">
												<li><a class="dropdown-item" th:href="|/admin/product_view/${lists.estate_id}|"><svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-eye me-2" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
													<path fill-rule="evenodd" d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.134 13.134 0 0 0 1.66 2.043C4.12 11.332 5.88 12.5 8 12.5c2.12 0 3.879-1.168 5.168-2.457A13.134 13.134 0 0 0 14.828 8a13.133 13.133 0 0 0-1.66-2.043C11.879 4.668 10.119 3.5 8 3.5c-2.12 0-3.879 1.168-5.168 2.457A13.133 13.133 0 0 0 1.172 8z"/>
													<path fill-rule="evenodd" d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
												</svg>상세</a></li>

												<li><a class="dropdown-item" th:href="|/admin/product_view/${lists.estate_id}|"><svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-pencil me-2" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
													<path fill-rule="evenodd" d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5L13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175l-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
												</svg>수정</a></li>

												<li><a class="dropdown-item" th:href="|/admin/product_view/${lists.estate_id}|"><svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-download me-2" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
													<path fill-rule="evenodd" d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
													<path fill-rule="evenodd" d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
												</svg>공인중개사</a></li>

												<li><hr class="dropdown-divider"></li>
												<li><a class="dropdown-item" th:href="|/admin/product_view/${lists.estate_id}|"><svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-trash me-2" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
													<path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
													<path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
												</svg>삭제</a></li>
											</ul>
											<!-- 드롭다운 메뉴 end -->

										</div><!--//dropdown-->
									</div><!--//app-card-actions-->
								</div><!--//app-card-body-->
							</div><!--//app-card-->
						</div>
					</th:block>
					<!-- 매물 블럭 낱개 end -->

				</div>
<!-- 매물 블럭 리스트 페이지 end -->

				<!-- 페이지네이션 start -->
				<nav class="app-pagination mt-5">
					<ul class="pagination justify-content-center">

						<li class="page-item" th:if="${estateDto.cpg gt 5}">
							<a th:href="|${pglink}${estateDto.cpg - 1}|" class="page-link">Prev</a>
						</li>

						<th:block th:each="i : ${#numbers.sequence(estateDto.strBlock, estateDto.endBlock)}">
							<li th:class="${(i ne estateDto.cpg) ? 'page-item' : 'page-item active'}">
								<a th:href="|${pglink}${i}|" class="page-link" th:text="${i}"></a>
							</li>
						</th:block>

						<li class="page-item">
							<a th:href="|${pglink}${estateDto.cpg + 1}|" class="page-link">Next</a>
						</li>

					</ul>
				</nav>
				<!-- 페이지네이션 end -->

			</div><!--//container-fluid-->
		</div><!--//app-content-->
	</div><!--//app-wrapper-->

</th:block>
</html>
