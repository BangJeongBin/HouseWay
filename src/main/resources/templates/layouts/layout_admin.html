<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" src="./favicon.icon" type="image/x-icon" size="32x32">
    <title>HOUSE WAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <!-- 관리자 전용 CSS -->
    <link id="theme-style" href="/css/admin.css" rel="stylesheet">
    <!-- FontAwesome JS-->
    <script defer src="/plugins/fontawesome/js/all.min.js"></script>


    <th:block layout:fragment="css"></th:block>
    <style>

    </style>
</head>
<body class="app">

    <!-- 웹페이지 레이아웃(가운데 정렬)을 위한 태그들 -->
    <div class="container">
        <div class="content-wrapper mx-auto">
            <!-- thymeleaf를 사용하여 header.html 구현 -->
            <div th:replace="~{fragments/header_admin::header}"></div>
            <th:block layout:fragment="content"></th:block>
            <!-- thymeleaf를 사용하여 footer.html 구현 -->
            <div th:replace="~{fragments/footer_admin::footer}"></div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<th:block layout:fragment="script"></th:block>
    <!-- Charts JS -->
    <script src="/plugins/chart.js/chart.min.js"></script>
    <script src="/js/admin/index-charts.js"></script>
    <!-- Page Specific JS -->
    <script src="/js/admin/app.js"></script>
</body>
</html>
