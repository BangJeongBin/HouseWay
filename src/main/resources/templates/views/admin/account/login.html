<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" src="./favicon.icon" type="image/x-icon" size="32x32">
	<title>HOUSE WAY</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
	<!-- 관리자 전용 CSS -->
	<link id="theme-style" href="/css/admin.css" rel="stylesheet">
	<!-- FontAwesome JS-->
	<script defer src="/plugins/fontawesome/js/all.min.js"></script>

</head>
<body class="app app-login p-0">

	<div class="row g-0 app-auth-wrapper">
		<div class="col-12 col-md-7 col-lg-6 auth-main-col text-center p-5">
			<div class="d-flex flex-column align-content-end">
				<div class="app-auth-body mx-auto">
					<div class="app-auth-branding mb-4"><a class="app-logo" href="../index.html"><img class="logo-icon me-2" src="/LOGO-removebg-preview.png" alt="logo"></a></div>
					<h2 class="auth-heading text-center mb-3">HOUSE WAY</h2>
					<h2 class="auth-heading text-center mb-5">관리자</h2>
					<div class="auth-form-container text-start">

						<!-- 로그인 폼 start -->
						<form class="auth-form login-form">
							<div class="email mb-3">
								<label class="sr-only" for="signin-email">Id</label>
								<input id="signin-email" name="signin-email" type="email" class="form-control signin-email" placeholder="아이디를 입력하세요" required="required">
							</div><!-- 아이디 input -->
							<div class="password mb-3">
								<label class="sr-only" for="signin-password">Password</label>
								<input id="signin-password" name="signin-password" type="password" class="form-control signin-password" placeholder="비밀번호를 입력하세요" required="required">
							</div><!-- 비밀번호 input -->
							<div class="text-center">
								<button type="submit" class="btn app-btn-primary w-100 theme-btn mx-auto">Log In</button>
							</div><!-- Log In submit -->
						</form>
						<!-- 로그인 폼 end -->

						<div class="auth-option text-center pt-5">
							<div class="forgot-password">
								<a th:href="|/admin/index|">비밀번호를 잊으셨나요?</a>
							</div>
						</div><!-- 비밀번호 찾기 a태그 -->
					</div><!--//auth-form-container-->
				</div><!--//auth-body-->

				<footer class="app-auth-footer">
					<span class="text-center py-3">Copyright &copy; 2025. Jeongbin. All rights reserved.</span>
				</footer><!--//app-auth-footer-->

			</div><!--//flex-column-->
		</div><!--//auth-main-col-->
	</div><!--//row-->

</body>
</html>
