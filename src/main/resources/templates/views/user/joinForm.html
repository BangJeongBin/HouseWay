<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<body>
<th:block layout:fragment="content" class="service-details-page">
  <main class="main">

    <!-- Page Title -->
    <div class="page-title light-background">
      <div class="container d-lg-flex justify-content-between align-items-center">
        <h1 class="mb-2 mb-lg-0">Login Form</h1>
        <nav class="breadcrumbs">
          <ol>
            <li><a href="index.html">Home</a></li>
            <li class="current">Join Form___</li>
          </ol>
        </nav>
      </div>
    </div><!-- End Page Title -->

    <!-- Service Details Section -->
    <section id="service-details" class="service-details section">


      <div class="shadow-lg p-3 mb-5 bg-body-tertiary rounded col-md-6 mx-auto p-5">
        <h2 class="text-center p-4 mb-4">회원가입</h2>
        <div class="col-md-8 mx-auto">
          <form action="" method="post" name="joinfrm" id="joinfrm" novalidate>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="floatingInput" placeholder="아이디" required>
              <label for="floatingInput">아이디</label>
            </div>
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="floatingPassword" placeholder="비밀번호" required>
              <label for="floatingPassword">비밀번호</label>
            </div>
            <div class="form-floating mb-3 pwd_icon">
              <input type="password" class="form-control" id="floatingRePwd" placeholder="비밀번호 확인" requiredv>
              <div><i class="fa-solid fa-eye"></i></div>
              <label for="floatingRePwd">비밀번호 확인</label>
            </div>
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="floatingInputEmail" placeholder="이메일" required>
              <label for="floatingInputEmail">이메일</label>
            </div>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="floatingInputPhone" placeholder="휴대폰 번호" required>
              <label for="floatingInputPhone">휴대폰 번호</label>
            </div>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="floatingInputAddr" placeholder="주소" required>
              <label for="floatingInputAddr">주소</label>
            </div>
            <div class="text-center p-4">
              <input class="btn btn-outline-success" type="submit" value="회원가입"></input>
            </div>
          </form>
        </div>
      </div>

      <div>테스트
      <input type="date">
      </div>

    </section>

  </main>

  <!-- Scroll Top -->
  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i
      class="bi bi-arrow-up-short"></i></a>

  <!-- Preloader -->
<!--  <div id="preloader"></div>-->

  <!-- Vendor JS Files -->
  <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/vendor/php-email-form/validate.js"></script>
  <script src="/vendor/aos/aos.js"></script>
  <script src="/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="/vendor/imagesloaded/imagesloaded.pkgd.min.js"></script>
  <script src="/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="/vendor/waypoints/noframework.waypoints.js"></script>
  <script src="/vendor/swiper/swiper-bundle.min.js"></script>

  <!-- Main JS File -->
<!--  <script src="/js/main.js"></script>-->
</th:block>

</body>
</html>
