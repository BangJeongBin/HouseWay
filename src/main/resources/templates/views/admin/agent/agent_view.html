<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{layouts/layout_admin}">

<th:block layout:fragment="content">

	<div class="app-wrapper">

		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">

				<h1 class="app-page-title">[[${agentDto.agentAllInfo.agent_name}]]님 상세정보</h1>
				<div class="row gy-4">

					<!-- Profile 앱 카드 start -->
					<div class="col-12 col-lg-6">
						<div class="app-card app-card-account shadow-sm d-flex flex-column align-items-start">
							<div class="app-card-header p-3 border-bottom-0">
								<div class="row align-items-center gx-3">
									<div class="col-auto">
										<div class="col-12 col-lg-auto text-center text-lg-start">
											<img class="profile-image" th:src="${agentDto.agentAllInfo.agent_photo}" alt="사진 없음">
										</div><!--//col-->

									</div><!--//col-->
									<div class="col-auto">
										<h4 class="app-card-title">Profile</h4>
									</div><!--//col-->
								</div><!--//row-->
							</div><!--//app-card-header-->

							<div class="app-card-body px-4 w-100">

								<div class="item border-bottom py-3">
									<div class="row justify-content-between align-items-center">
										<div class="col-auto">
											<div class="item-label"><strong>Number</strong></div>
											<div class="item-data" th:text="${agentDto.agentAllInfo.agent_num}"></div>
										</div>
									</div>
								</div><!-- agent_num -->

								<div class="item border-bottom py-3">
									<div class="row justify-content-between align-items-center">
										<div class="col-auto">
											<div class="item-label"><strong>Name</strong></div>
											<div class="item-data" th:text="${agentDto.agentAllInfo.agent_name}"></div>
										</div>
									</div>
								</div><!-- agent_name -->

								<div class="item border-bottom py-3">
									<div class="row justify-content-between align-items-center">
										<div class="col-auto">
											<div class="item-label"><strong>Sales</strong></div>
											<div class="item-data" th:text="${agentDto.agentAllInfo.agent_salecount}"></div>
										</div>
									</div>
								</div><!-- agent_salecount -->

								<div class="item border-bottom py-3">
									<div class="row justify-content-between align-items-center">
										<div class="col-auto">
											<div class="item-label"><strong>Area</strong></div>
											<div class="item-data" th:text="${agentDto.agentAllInfo.agent_local}"></div>
										</div>
									</div>
								</div><!-- agent_local -->

							</div>
						</div>
					</div><!--//col-->
					<!-- Profile 앱 카드 end -->

					<!-- Office 앱 카드 start -->
					<div class="col-12 col-lg-6">
						<div class="app-card app-card-account shadow-sm d-flex flex-column align-items-start">
							<div class="app-card-header p-3 border-bottom-0">
								<div class="row align-items-center gx-3">
									<div class="col-auto">
										<div class="app-icon-holder">
											<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-buildings" viewBox="0 0 16 16">
												<path d="M14.763.075A.5.5 0 0 1 15 .5v15a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5V14h-1v1.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V10a.5.5 0 0 1 .342-.474L6 7.64V4.5a.5.5 0 0 1 .276-.447l8-4a.5.5 0 0 1 .487.022M6 8.694 1 10.36V15h5zM7 15h2v-1.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5V15h2V1.309l-7 3.5z"/>
												<path d="M2 11h1v1H2zm2 0h1v1H4zm-2 2h1v1H2zm2 0h1v1H4zm4-4h1v1H8zm2 0h1v1h-1zm-2 2h1v1H8zm2 0h1v1h-1zm2-2h1v1h-1zm0 2h1v1h-1zM8 7h1v1H8zm2 0h1v1h-1zm2 0h1v1h-1zM8 5h1v1H8zm2 0h1v1h-1zm2 0h1v1h-1zm0-2h1v1h-1z"/>
											</svg>
										</div><!--//icon-holder-->

									</div><!--//col-->
									<div class="col-auto">
										<h4 class="app-card-title">Office</h4>
									</div><!--//col-->
								</div><!--//row-->
							</div><!--//app-card-header-->
							<div class="app-card-body px-4 w-100">

								<div class="item border-bottom py-3">
									<div class="row justify-content-between align-items-center">
										<div class="col-auto">
											<div class="item-label"><strong>Name</strong></div>
											<div class="item-data" th:text="${agentDto.agentAllInfo.office_name}"></div>
										</div>
									</div>
								</div><!-- office_name -->

								<div class="item border-bottom py-3">
									<div class="row justify-content-between align-items-center">
										<div class="col-auto">
											<div class="item-label"><strong>Phone</strong></div>
											<div class="item-data" th:text="${agentDto.agentAllInfo.agent_phone}"></div>
										</div>
									</div>
								</div><!-- agent_phone -->

								<div class="item border-bottom py-3">
									<div class="row justify-content-between align-items-center">
										<div class="col-auto">
											<div class="item-label"><strong>Address</strong></div>
											<div class="item-data" th:text="${agentDto.agentAllInfo.office_address}"></div>
										</div>
									</div>
								</div><!-- office_address -->

								<div class="item border-bottom py-3">
									<div class="row justify-content-between align-items-center">
										<div class="col-auto">
											<div class="item-label"><strong>Description</strong></div>
											<div class="item-data" th:text="${agentDto.agentAllInfo.agent_intro}"></div>
										</div>
									</div>
								</div><!-- agent_intro -->

							</div>
						</div>
					</div>
					<!-- Office 앱 카드 end -->

					<!-- Reserved 앱 카드 start -->
					<div class="col-12 col-lg-6">
						<div class="app-card app-card-account shadow-sm d-flex flex-column align-items-start">
							<div class="app-card-header p-3 border-bottom-0">
								<div class="row align-items-center gx-3">
									<div class="col-auto">
										<div class="app-icon-holder">
											<svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-shield-check" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
												<path fill-rule="evenodd" d="M5.443 1.991a60.17 60.17 0 0 0-2.725.802.454.454 0 0 0-.315.366C1.87 7.056 3.1 9.9 4.567 11.773c.736.94 1.533 1.636 2.197 2.093.333.228.626.394.857.5.116.053.21.089.282.11A.73.73 0 0 0 8 14.5c.007-.001.038-.005.097-.023.072-.022.166-.058.282-.111.23-.106.525-.272.857-.5a10.197 10.197 0 0 0 2.197-2.093C12.9 9.9 14.13 7.056 13.597 3.159a.454.454 0 0 0-.315-.366c-.626-.2-1.682-.526-2.725-.802C9.491 1.71 8.51 1.5 8 1.5c-.51 0-1.49.21-2.557.491zm-.256-.966C6.23.749 7.337.5 8 .5c.662 0 1.77.249 2.813.525a61.09 61.09 0 0 1 2.772.815c.528.168.926.623 1.003 1.184.573 4.197-.756 7.307-2.367 9.365a11.191 11.191 0 0 1-2.418 2.3 6.942 6.942 0 0 1-1.007.586c-.27.124-.558.225-.796.225s-.526-.101-.796-.225a6.908 6.908 0 0 1-1.007-.586 11.192 11.192 0 0 1-2.417-2.3C2.167 10.331.839 7.221 1.412 3.024A1.454 1.454 0 0 1 2.415 1.84a61.11 61.11 0 0 1 2.772-.815z"/>
												<path fill-rule="evenodd" d="M10.854 6.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 8.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
											</svg>
										</div><!--//icon-holder-->

									</div><!--//col-->
									<div class="col-auto">
										<h4 class="app-card-title">Reserved</h4>
									</div><!--//col-->
								</div><!--//row-->
							</div><!--//app-card-header-->
							<div class="app-card-body px-4 w-100">

								<div class="table-responsive">
									<table class="table app-table-hover mb-0 text-left">
										<thead>
											<tr>
												<th class="cell">Number</th>
												<th class="cell">Estate.Id</th>
												<th class="cell">User.Id</th>
												<th class="cell">Date</th>
												<th class="cell"></th>
											</tr>
										</thead>
										<tbody>

										<!-- 해당 회원 예약 리스트 start -->
										<th:block th:if="${!#lists.isEmpty(agentDto.agentReservList)}">
											<th:block th:each="rlists : ${agentDto.agentReservList}">
												<tr>
													<td class="cell" th:text="${rlists.reserv_num}"></td>
													<td class="cell"><span class="truncate" th:text="${rlists.estate_id}"></span></td>
													<td class="cell" th:text="${rlists.user_id}"></td>
													<td class="cell"><span th:text="${rlists.reserv_regdate}"></span></td>

													<th:block th:if="${rlists.reserv_state eq 1}">
														<td class="cell"><span class="badge bg-warning">예약검토</span></td>
													</th:block>

													<th:block th:if="${rlists.reserv_state eq 2}">
														<td class="cell"><span class="badge bg-danger">예약반려</span></td>
													</th:block>

													<th:block th:if="${rlists.reserv_state eq 3}">
														<td class="cell"><span class="badge bg-success">예약성공</span></td>
													</th:block>
												</tr>
											</th:block>
										</th:block>

										<th:block th:if="${#lists.isEmpty(agentDto.agentReservList)}">
											<tr>
												<td class="cell" colspan="5">예약 목록이 없습니다.</td>
											</tr>
										</th:block>
										<!-- 해당 회원 예약 리스트 end -->

										</tbody>
									</table>
								</div><!--//table-responsive-->
							</div><!--//app-card-body-->

						</div><!--//app-card-->
					</div>
					<!-- Reserved 앱 카드 start -->

					<!-- Estate 앱 카드 start -->
					<div class="col-12 col-lg-6">
						<div class="app-card app-card-account shadow-sm d-flex flex-column align-items-start">
							<div class="app-card-header p-3 border-bottom-0">
								<div class="row align-items-center gx-3">
									<div class="col-auto">
										<div class="app-icon-holder">
											<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pc-display" viewBox="0 0 16 16">
												<path d="M8 1a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1zm1 13.5a.5.5 0 1 0 1 0 .5.5 0 0 0-1 0m2 0a.5.5 0 1 0 1 0 .5.5 0 0 0-1 0M9.5 1a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zM9 3.5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 0-1h-5a.5.5 0 0 0-.5.5M1.5 2A1.5 1.5 0 0 0 0 3.5v7A1.5 1.5 0 0 0 1.5 12H6v2h-.5a.5.5 0 0 0 0 1H7v-4H1.5a.5.5 0 0 1-.5-.5v-7a.5.5 0 0 1 .5-.5H7V2z"/>
											</svg>
										</div><!--//icon-holder-->

									</div><!--//col-->
									<div class="col-auto">
										<h4 class="app-card-title">Estate</h4>
									</div><!--//col-->
								</div><!--//row-->
							</div><!--//app-card-header-->
							<div class="app-card-body px-4 w-100">

								<div class="table-responsive">
									<table class="table app-table-hover mb-0 text-left">
										<thead>
											<tr>
												<th class="cell">Id</th>
												<th class="cell">Name</th>
												<th class="cell">Address</th>
												<th class="cell">Rent</th>
												<th class="cell">State</th>
											</tr>
										</thead>
										<tbody>

										<!-- 해당 회원 구매내역 리스트 start -->
										<th:block th:if="${!#lists.isEmpty(agentDto.agentEstateList)}">
											<th:block th:each="slists : ${agentDto.agentEstateList}">
												<tr>
													<td class="cell"><a th:href="|/admin/product_view/${slists.estate_id}|">
														<span class="truncate" th:text="${slists.estate_id}"></span></a></td>
													<td class="cell"><span class="truncate" th:text="${slists.estate_title}"></span></td>
													<td class="cell"><span class="truncate" th:text="${slists.estate_addr}"></span></td>
													<td class="cell"><span class="truncate" th:text="${slists.estate_rent}"></span></td>

													<th:block th:if="${slists.estate_state == 1}">
														<td class="cell"><span class="badge bg-success">판매중</span></td>
													</th:block>

													<th:block th:if="${slists.estate_state == 0}">
														<td class="cell"><span class="badge bg-danger">핀매완료</span></td>
													</th:block>
												</tr>
											</th:block>
										</th:block>

										<th:block th:if="${#lists.isEmpty(agentDto.agentEstateList)}">
											<tr>
												<td class="cell" colspan="4">보유한 매물이 없습니다.</td>
											</tr>
										</th:block>
										<!-- 해당 회원 구매내역 리스트 end -->

										</tbody>
									</table>
								</div><!--//table-responsive-->
							</div><!--//app-card-body-->

						</div><!--//app-card-->
					</div>
					<!-- Estate 앱 카드 end -->

					<hr class="my-4">

					<div class="app-card-footer p-4 mt-auto" align="center">
						<button type="button" class="btn btn-danger" id="rmvagnbtn">Delete</button>
					</div>

				</div><!--//row-->
			</div><!--//container-fluid-->
		</div><!--//app-content-->
	</div><!--//app-wrapper-->

</th:block>

<th:block layout:fragment="script">
	<script src="/js/admin/member.js"></script>
	<script th:inline="javascript">
		let rmvagnbtn = document.querySelector("#rmvagnbtn");

		const agent_num = [[${agent_num}]];

		rmvagnbtn.addEventListener('click', (e) => {
			if (confirm('정말로 삭제 하시겠습니까?')) {
				location.href = `/admin/agent_remove?agent_num=${agent_num}`;
			}
		});
	</script>
</th:block>
</html>
