<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" src="./favicon.icon" type="image/x-icon" size="32x32">
	<title>HOUSE WAY</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
	<!-- 관리자 전용 CSS -->
	<link id="theme-style" href="/css/admin.css" rel="stylesheet">
	<!-- FontAwesome JS-->
	<script defer src="/plugins/fontawesome/js/all.min.js"></script>

	 <style>
		 .error-message {
			 color: #dc3545;
			 font-size: 0.95em;
			 margin: 10px 0;
			 /*display: none;*/
		 }
	 </style>

</head>
<body class="app app-reset-password p-0">

	<div class="row g-0 app-auth-wrapper">
		<div class="col-12 col-md-7 col-lg-6 auth-main-col text-center p-5">
			<div class="d-flex flex-column align-content-end">
				<div class="app-auth-body mx-auto">
					<div class="app-auth-branding mb-4"><a class="app-logo" href="../index.html"><img class="logo-icon me-2" src="assets/images/app-logo.svg" alt="logo"></a></div>
					<h2 class="auth-heading text-center mb-4">Password Reset</h2>

					<div class="auth-intro mb-4 text-center">비밀번호 재설정 페이지 입니다. 비밀번호를 재설정 하기 위해 이메일을 입력해 주세요.</div>

					<div class="auth-form-container text-left">

						<form class="auth-form resetpass-form" name="repwdfrm" id="repwdfrm" method="post" novalidate>
							<div class="email mb-3">
								<label class="sr-only" for="admin_password">Email</label>
								<input id="admin_password" name="admin_password" type="password" class="form-control login-email" placeholder="Email">
							</div><!--//form-group-->
							<div class="text-center">
								<button type="submit" class="btn app-btn-primary btn-block theme-btn mx-auto">비밀번호 재설정</button>
							</div>
						</form>

						<div class="auth-option text-center pt-5"><a class="app-link" href="login.html" >Log in</a></div>
					</div><!--//auth-form-container-->

				</div><!--//auth-body-->

				<footer class="app-auth-footer">
					<span class="text-center py-3">Copyright &copy; 2025. Jeongbin. All rights reserved.</span>
				</footer><!--//app-auth-footer-->

			</div><!--//flex-column-->
		</div><!--//auth-main-col-->
	</div><!--//row-->

<script src="/js/admin/account.js"></script>
<script>
	// 비어있는 input 태그가 있을 시 submit 버튼 block
	const repwdfrm = document.querySelector('#repwdfrm');   // id로 target 함

	repwdfrm.addEventListener("submit", (e) => {
		e.preventDefault();

		clearErrorMessages();  // 에러메세지 초기화

		let admin_password = document.querySelector("#admin_password").value;

		console.log(admin_password);


		let isValid = validResetPwd(e.target);

		if (isValid) {
			location.href = `/admin/rePassword/${admin_password}`;
		}
	});
</script>

</body>
</html>
