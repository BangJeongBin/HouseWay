<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" src="./favicon.icon" type="image/x-icon" size="32x32">
	<title>HOUSE WAY</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
	<!-- 관리자 전용 CSS -->
	<link id="theme-style" href="/css/admin.css" rel="stylesheet">
	<!-- FontAwesome JS-->
	<script defer src="/plugins/fontawesome/js/all.min.js"></script>

	<style>
		.error-message {
			color: #dc3545;
			font-size: 0.95em;
			margin: 10px 0;
			/*display: none;*/
		}
	</style>

</head>
<body class="app app-login p-0">

	<div class="row g-0 app-auth-wrapper">
		<div class="col-12 col-md-7 col-lg-6 auth-main-col text-center p-5">
			<div class="d-flex flex-column align-content-end">
				<div class="app-auth-body mx-auto">
					<div class="app-auth-branding mb-4"><a class="app-logo" href="../index.html"><img class="logo-icon me-2" src="/LOGO-removebg-preview.png" alt="logo"></a></div>
					<h2 class="auth-heading text-center mb-3">HOUSE WAY</h2>
					<h2 class="auth-heading text-center mb-5">관리자 비밀번호 재설정</h2>
					<div class="auth-form-container text-start">

						<!-- 재설정 폼 start -->
						<form class="auth-form login-form" name="resetfrm" id="resetfrm" method="post" action="/admin/resetOk_admin" novalidate>
							<div class="email mb-3">
								<input id="admin_password_check" name="admin_password_check" type="password" class="form-control signin-email" placeholder="재설정할 비밀번호를 입력하세요" required>
								<label class="sr-only" for="admin_password_check">Id</label>
							</div><!-- 비밀번호 input -->
							<div class="password mb-3">
								<input id="admin_password" name="admin_password" type="password" class="form-control signin-password" placeholder="비밀번호 확인" required>
								<label class="sr-only" for="admin_password">Password</label>
							</div><!-- 재설정 비밀번호 input -->
							<div class="text-center">
								<button type="submit" class="btn app-btn-primary w-100 theme-btn mx-auto">Reset Password</button>
							</div><!-- Log In submit -->
						</form>
						<!-- 재설정 폼 end -->

					</div><!--//auth-form-container-->
				</div><!--//auth-body-->

				<footer class="app-auth-footer">
					<span class="text-center py-3">Copyright &copy; 2025. Jeongbin. All rights reserved.</span>
				</footer><!--//app-auth-footer-->

			</div><!--//flex-column-->
		</div><!--//auth-main-col-->
	</div><!--//row-->

<script src="/js/admin/account.js"></script>
<script>
	// 비어있는 input 태그가 있을 시 submit 버튼 block
	const resetfrm = document.querySelector('#resetfrm');

	resetfrm.addEventListener("submit", (e) => {
		let admin_password_check = document.querySelector('#admin_password_check').value;
		let admin_password = document.querySelector('#admin_password').value;

		e.preventDefault(); // submit 버튼 기능 중지, 이 코드 미 작성 시 alert는 뜨지만 페이지는 이동함

		clearErrorMessages();  // 에러메세지 초기화

		// 입력 요소 유효성 검사 - account.js 함수 호출
		let isValid = validReset(e.target);

		// 비밀번호 일치 여부 검사
		if (admin_password_check !== admin_password) {
			alert('비밀번호가 일치하지 않습니다. 다시 입력해 주세요');
			return;
		}

		if (isValid) {
			// 모든 검증이 통과하면 폼 제출
			resetfrm.submit();
		}
	});
</script>

</body>
</html>
